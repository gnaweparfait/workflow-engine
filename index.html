<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WorkflowEngine</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/main.css" />
    <script>
      (function () {
        try {
          if (localStorage.getItem('workflow-engine:theme') === 'light') {
            document.documentElement.setAttribute('data-theme', 'light');
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div class="app">
      <header class="header">
        <div class="header__brand">
          <div class="header__logo" aria-hidden="true">
            <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
              <rect x="2" y="2" width="12" height="12" rx="3" fill="url(#logo-grad)" />
              <rect x="18" y="2" width="12" height="12" rx="3" fill="url(#logo-grad)" opacity="0.7" />
              <rect x="2" y="18" width="12" height="12" rx="3" fill="url(#logo-grad)" opacity="0.5" />
              <rect x="18" y="18" width="12" height="12" rx="3" fill="url(#logo-grad)" opacity="0.35" />
              <defs>
                <linearGradient id="logo-grad" x1="0" y1="0" x2="32" y2="32">
                  <stop stop-color="#818cf8" />
                  <stop offset="1" stop-color="#6366f1" />
                </linearGradient>
              </defs>
            </svg>
          </div>
          <div class="header__titles">
            <h1 class="header__name">WorkflowEngine</h1>
            <p class="header__tagline">Kanban orienté événements</p>
          </div>
        </div>

        <div class="header__actions">
          <div class="search-field">
            <svg class="search-field__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <circle cx="11" cy="11" r="8" />
              <path d="M21 21l-4.35-4.35" />
            </svg>
            <input
              type="search"
              id="search-input"
              class="search-field__input"
              placeholder="Titre, description ou section…"
              aria-label="Rechercher une tâche ou une section"
              title="Ex. « en cours », « terminé », « examen »"
            />
          </div>

          <div class="header__stat">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <path d="M9 11l3 3L22 4" />
              <path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11" />
            </svg>
            <span id="task-count" class="header__stat-value">0</span>
            <span class="header__stat-label">tâches</span>
          </div>

          <button
            type="button"
            id="btn-theme-toggle"
            class="btn btn--icon theme-toggle"
            aria-label="Activer le mode clair"
            aria-pressed="false"
            title="Changer le thème clair / sombre"
          >
            <svg class="theme-toggle__icon theme-toggle__icon--sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <circle cx="12" cy="12" r="5" />
              <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" />
            </svg>
            <svg class="theme-toggle__icon theme-toggle__icon--moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" />
            </svg>
          </button>

          <div class="header__data">
            <button type="button" id="btn-export" class="btn btn--secondary btn--compact" title="Exporter le tableau en JSON">
              Export
            </button>
            <button type="button" id="btn-import" class="btn btn--secondary btn--compact" title="Importer un fichier JSON">
              Import
            </button>
            <input type="file" id="import-file-input" accept="application/json,.json" hidden />
          </div>

          <div class="header__history">
            <button type="button" id="btn-undo" class="btn btn--icon" title="Annuler (Ctrl+Z)" aria-label="Annuler" disabled>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <path d="M3 10h10a5 5 0 015 5v2M3 10l4-4M3 10l4 4" />
              </svg>
            </button>
            <button type="button" id="btn-redo" class="btn btn--icon" title="Rétablir (Ctrl+Y)" aria-label="Rétablir" disabled>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <path d="M21 10H11a5 5 0 00-5 5v2M21 10l-4-4M21 10l-4 4" />
              </svg>
            </button>
          </div>

          <div class="header__buttons">
            <button type="button" id="btn-new-column" class="btn btn--secondary">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <path d="M12 5v14M5 12h14" />
              </svg>
              Colonne
            </button>
            <button
              type="button"
              id="btn-save-all"
              class="btn btn--secondary"
              title="Enregistrer toutes les tâches (colonnes incluses)"
            >
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z" />
                <path d="M17 21v-8H7v8M7 3v5h8" />
              </svg>
              Enregistrer
            </button>
            <button type="button" id="btn-new-task" class="btn btn--primary btn--glow">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
                <path d="M12 5v14M5 12h14" />
              </svg>
              Nouvelle tâche
            </button>
          </div>
        </div>
      </header>

      <main class="main">
        <div class="board-wrapper">
          <div id="board" class="board" aria-live="polite"></div>
        </div>
      </main>
    </div>

    <div id="notifications" class="notifications" aria-live="polite"></div>

    <!-- Modal création / édition -->
    <div id="task-modal" class="modal" hidden>
      <div class="modal__backdrop" data-action="close-modal"></div>
      <div class="modal__dialog" role="dialog" aria-modal="true" aria-labelledby="modal-title">
        <header class="modal__header">
          <h2 id="modal-title" class="modal__title">Nouvelle tâche</h2>
          <button type="button" class="modal__close" data-action="close-modal" aria-label="Fermer">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M18 6L6 18M6 6l12 12" />
            </svg>
          </button>
        </header>

        <form id="task-form" class="modal__form" novalidate>
          <div class="field">
            <label class="field__label" for="task-title">Titre <span class="field__required">*</span></label>
            <input
              type="text"
              id="task-title"
              class="field__input"
              placeholder="Ex. Préparer la soutenance"
              required
              autocomplete="off"
            />
          </div>

          <div class="field">
            <label class="field__label" for="task-description">Description</label>
            <textarea
              id="task-description"
              class="field__input field__input--area"
              rows="3"
              placeholder="Détails, critères, liens…"
            ></textarea>
          </div>

          <div class="field">
            <label class="field__label" for="task-column-search">Section</label>
            <div class="column-search">
              <svg class="column-search__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <circle cx="11" cy="11" r="8" />
                <path d="M21 21l-4.35-4.35" />
              </svg>
              <input
                type="search"
                id="task-column-search"
                class="field__input column-search__input"
                placeholder="Rechercher : à faire, en cours, terminé…"
                autocomplete="off"
                aria-describedby="column-picker-hint"
              />
            </div>
            <p id="column-picker-hint" class="field__hint">
              Choisissez où placer la tâche. La recherche filtre les sections ci-dessous.
            </p>
            <div id="task-column-picker" class="column-picker" role="radiogroup" aria-label="Section Kanban">
              <p class="column-picker__empty" hidden>Aucune section ne correspond à votre recherche.</p>
            </div>
          </div>

          <div class="field-row">
            <div class="field">
              <label class="field__label" for="task-priority">Priorité</label>
              <select id="task-priority" class="field__input field__input--select">
                <option value="low">Basse</option>
                <option value="medium" selected>Moyenne</option>
                <option value="high">Haute</option>
                <option value="urgent">Urgente</option>
              </select>
            </div>
            <div class="field">
              <label class="field__label" for="task-due-date">Échéance</label>
              <input type="date" id="task-due-date" class="field__input" />
            </div>
            <div class="field">
              <label class="field__label" for="task-color">Couleur</label>
              <select id="task-color" class="field__input field__input--select">
                <option value="default">Par défaut</option>
                <option value="red">Rouge</option>
                <option value="blue">Bleu</option>
                <option value="green">Vert</option>
                <option value="yellow">Jaune</option>
              </select>
            </div>
          </div>

          <footer class="modal__footer">
            <button type="button" class="btn btn--ghost" data-action="close-modal">Annuler</button>
            <button type="submit" id="task-submit-btn" class="btn btn--primary">Créer la tâche</button>
          </footer>
        </form>
      </div>
    </div>

    <!-- Modal colonne -->
    <div id="column-modal" class="modal" hidden>
      <div class="modal__backdrop" data-action="close-column-modal"></div>
      <div class="modal__dialog" role="dialog" aria-modal="true" aria-labelledby="column-modal-title">
        <header class="modal__header">
          <h2 id="column-modal-title" class="modal__title">Nouvelle colonne</h2>
          <button type="button" class="modal__close" data-action="close-column-modal" aria-label="Fermer">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M18 6L6 18M6 6l12 12" />
            </svg>
          </button>
        </header>
        <form id="column-form" class="modal__form" novalidate>
          <div class="field">
            <label class="field__label" for="column-label">Nom <span class="field__required">*</span></label>
            <input type="text" id="column-label" class="field__input" placeholder="Ex. En revue" required autocomplete="off" />
          </div>
          <div class="field">
            <label class="field__label" for="column-accent">Couleur d'accent</label>
            <input type="color" id="column-accent" class="field__input field__input--color" value="#6366f1" />
          </div>
          <footer class="modal__footer">
            <button type="button" class="btn btn--ghost" data-action="close-column-modal">Annuler</button>
            <button type="submit" id="column-submit-btn" class="btn btn--primary">Créer la colonne</button>
          </footer>
        </form>
      </div>
    </div>

    <!-- Templates HTML5 -->
    <template id="tpl-column">
      <section class="column">
        <header class="column__header">
          <div class="column__header-left">
            <span class="column__accent"></span>
            <h2 class="column__title"></h2>
          </div>
          <div class="column__header-right">
            <div class="column__actions">
              <button type="button" class="column__action" data-action="edit-column" aria-label="Modifier la colonne">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7" />
                  <path d="M18.5 2.5a2.12 2.12 0 013 3L12 15l-4 1 1-4 9.5-9.5z" />
                </svg>
              </button>
              <button type="button" class="column__action column__action--danger" data-action="delete-column" aria-label="Supprimer la colonne">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2" />
                </svg>
              </button>
            </div>
            <span class="column__count">0</span>
          </div>
        </header>
        <div class="column__cards" data-drop-zone></div>
        <footer class="column__quick-add">
          <input
            type="text"
            class="column__quick-input"
            placeholder="Nouvelle tâche…"
            maxlength="200"
            aria-label="Ajouter une tâche dans cette colonne"
          />
          <button type="button" class="column__quick-btn" data-action="quick-add-task" aria-label="Ajouter">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
              <path d="M12 5v14M5 12h14" />
            </svg>
          </button>
        </footer>
      </section>
    </template>

    <template id="tpl-task-card">
      <article class="card" draggable="true">
        <div class="card__top">
          <span class="card__badge badge"></span>
          <div class="card__actions">
            <button type="button" class="card__action" data-action="edit" aria-label="Modifier">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7" />
                <path d="M18.5 2.5a2.12 2.12 0 013 3L12 15l-4 1 1-4 9.5-9.5z" />
              </svg>
            </button>
            <button type="button" class="card__action card__action--danger" data-action="delete" aria-label="Supprimer">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2" />
              </svg>
            </button>
          </div>
        </div>
        <h3 class="card__title"></h3>
        <p class="card__description" hidden></p>
        <footer class="card__footer">
          <span class="card__date" hidden>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="4" width="18" height="18" rx="2" />
              <path d="M16 2v4M8 2v4M3 10h18" />
            </svg>
            <span class="card__date-text"></span>
          </span>
        </footer>
      </article>
    </template>

    <template id="tpl-empty-column">
      <div class="column-empty">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
          <rect x="3" y="3" width="18" height="18" rx="2" />
          <path d="M12 8v8M8 12h8" />
        </svg>
        <p>Aucune tâche</p>
        <span>Glissez une carte ici</span>
        <button type="button" class="column-empty__btn" data-action="add-to-column">
          Ajouter ici
        </button>
      </div>
    </template>

    <template id="tpl-toast">
      <div class="toast" role="status">
        <span class="toast__icon"></span>
        <span class="toast__message"></span>
      </div>
    </template>

    <script type="module">
      import { initApp } from './js/core/app.js';
      initApp();
    </script>
  </body>
</html>
